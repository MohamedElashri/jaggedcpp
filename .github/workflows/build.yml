name: CMake CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - cc: gcc
            cxx: g++
          - cc: clang
            cxx: clang++
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # sanad: ref=v4

    - name: Configure
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Generate Single Header
      run: python scripts/amalgamate.py

    - name: Upload Single Header Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # sanad: ref=v7.0.1
      with:
        name: awkward-single-header-${{ matrix.cc }}
        path: awkward.h


  sanitizers:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # sanad: ref=v4

    - name: Configure ASan and UBSan
      env:
        CC: gcc
        CXX: g++
      run: >-
        cmake -S . -B build-sanitized -DCMAKE_BUILD_TYPE=Debug
        -DJAGGEDCPP_ENABLE_SANITIZERS=ON

    - name: Build
      run: cmake --build build-sanitized

    - name: Test
      env:
        ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
      run: ctest --test-dir build-sanitized --output-on-failure
