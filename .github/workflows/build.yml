name: CMake CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - cc: gcc
            cxx: g++
          - cc: clang
            cxx: clang++
    steps:
    - uses: actions/checkout@v4

    - name: Configure
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure ASan and UBSan
      env:
        CC: gcc
        CXX: g++
      run: >-
        cmake -S . -B build-sanitized -DCMAKE_BUILD_TYPE=Debug
        -DJAGGEDCPP_ENABLE_SANITIZERS=ON

    - name: Build
      run: cmake --build build-sanitized

    - name: Test
      env:
        ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
      run: ctest --test-dir build-sanitized --output-on-failure
